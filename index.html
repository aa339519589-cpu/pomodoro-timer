<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>" />
</head>
<body>
  <div class="container">
    <h1 class="title">🍅 番茄钟</h1>

    <div class="mode-tabs">
      <button class="tab active" data-mode="work">工作</button>
      <button class="tab" data-mode="shortBreak">短休息</button>
      <button class="tab" data-mode="longBreak">长休息</button>
    </div>

    <div class="timer-circle">
      <svg viewBox="0 0 220 220" class="progress-ring">
        <circle cx="110" cy="110" r="100" class="ring-bg" />
        <circle cx="110" cy="110" r="100" class="ring-progress" />
      </svg>
      <div class="timer-display">
        <span id="minutes">25</span><span>:</span><span id="seconds">00</span>
      </div>
      <div class="timer-status" id="status">就绪</div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-primary">开始</button>
      <button id="pauseBtn" class="btn btn-secondary" disabled>暂停</button>
      <button id="resetBtn" class="btn btn-secondary">重置</button>
    </div>

    <div class="stats">
      <span>今日完成：<strong id="completedCount">0</strong> 个番茄</span>
    </div>

    <div class="settings">
      <h3>⏱ 设置</h3>
      <div class="setting-row">
        <label>工作时间（分）</label>
        <input type="number" id="workDuration" value="25" min="1" max="120" />
      </div>
      <div class="setting-row">
        <label>短休息（分）</label>
        <input type="number" id="shortBreakDuration" value="5" min="1" max="30" />
      </div>
      <div class="setting-row">
        <label>长休息（分）</label>
        <input type="number" id="longBreakDuration" value="15" min="1" max="60" />
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
